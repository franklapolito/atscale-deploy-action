name: 'Deploy AtScale PoT'
description: 'Provisions one self-contained Azure VM (MicroK8s + Helm) and deploys AtScale via the chart''s own atscale-ingress-gateway LoadBalancer.'

inputs:
  client_id:             { description: 'Client / prospect name (e.g. acme) — drives naming + <client>.atscalehosted.com', required: true }
  region:                { description: 'Azure region', required: false, default: 'eastus' }
  vm_size:               { description: 'VM size (D1: proven default E8s_v3; bump to D16s_v5 for more concurrency)', required: false, default: 'Standard_E8s_v3' }
  chart_version:         { description: 'AtScale chart version (floor C2026.5.1+)', required: false, default: '2026.5.1' }
  base_domain:           { description: 'Apex domain for the wildcard cert', required: false, default: 'atscalehosted.com' }
  open_thrift:           { description: 'Open port 11111 (Thrift) — only if a BI tool needs it', required: false, default: 'false' }
  keyvault:              { description: 'Key Vault holding the wildcard key (and cert, if not passed inline)', required: false, default: 'se-demo-keyvault' }
  cert_secret:           { description: 'Public cert secret name (KV fallback when cert_pem is empty)', required: false, default: 'atscalehosted-com-cert' }
  key_secret:            { description: 'Private key secret name (base64 PEM)', required: false, default: 'atscalehosted-com-cert-private-key' }
  cert_pem:              { description: 'Fullchain cert PEM (leaf + intermediates) supplied inline instead of from KV — e.g. a GitHub secret', required: false, default: '' }
  key_pem:               { description: 'Private key PEM supplied inline instead of from KV', required: false, default: '' }
  cloudflare_api_token:  { description: 'Cloudflare token for DNS A-record (Phase 2; omit for manual v1)', required: false, default: '' }
  cloudflare_zone_id:    { description: 'Cloudflare zone id for atscalehosted.com (Phase 2)', required: false, default: '' }
  azure_client_id:       { description: 'Azure client id (OIDC)', required: true }
  azure_tenant_id:       { description: 'Azure tenant id', required: true }
  azure_subscription_id: { description: 'Azure subscription id', required: true }
  ssh_public_key:        { description: 'SSH public key', required: true }
  ssh_private_key:       { description: 'SSH private key', required: true }

outputs:
  ingress_domain:
    description: 'PoT hostname (<client>.atscalehosted.com) — the AtScale front door once DNS resolves'
    value: ${{ steps.deploy.outputs.ingress_domain }}
  engine_url:
    description: 'Design-center / engine URL (https://<client>.atscalehosted.com) — hand to ps-utils as the atscale: connection url'
    value: ${{ steps.deploy.outputs.engine_url }}
  public_ip:
    description: 'LoadBalancer public IP — for /etc/hosts injection so a runner can reach ingress_domain before DNS (design §3.2c)'
    value: ${{ steps.deploy.outputs.public_ip }}
  azure_fqdn:
    description: 'Azure public-IP FQDN (fallback hostname)'
    value: ${{ steps.deploy.outputs.azure_fqdn }}
  resource_group:
    description: 'Azure resource group (rg-poc-<client>) — for later teardown'
    value: ${{ steps.deploy.outputs.resource_group }}

runs:
  using: "composite"
  steps:
    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: Provision + deploy
      id: deploy
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CLIENT_ID:            ${{ inputs.client_id }}
        REGION:               ${{ inputs.region }}
        VM_SIZE:              ${{ inputs.vm_size }}
        CHART_VERSION:        ${{ inputs.chart_version }}
        BASE_DOMAIN:          ${{ inputs.base_domain }}
        OPEN_THRIFT:          ${{ inputs.open_thrift }}
        SUBSCRIPTION:         ${{ inputs.azure_subscription_id }}
        KEYVAULT:             ${{ inputs.keyvault }}
        CERT_SECRET:          ${{ inputs.cert_secret }}
        KEY_SECRET:           ${{ inputs.key_secret }}
        CERT_PEM:             ${{ inputs.cert_pem }}
        KEY_PEM:              ${{ inputs.key_pem }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
        CLOUDFLARE_ZONE_ID:   ${{ inputs.cloudflare_zone_id }}
        SSH_PUBLIC_KEY:       ${{ inputs.ssh_public_key }}
        SSH_PRIVATE_KEY:      ${{ inputs.ssh_private_key }}
      run: |
        chmod +x ./deploy.sh ./scripts/bootstrap-node.sh
        ./deploy.sh create
